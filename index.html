    function useRevealOnScroll(ref, selector, staggerMs = 80) {
      useEffect(() => {
        if (!ref.current) return;
        const els = ref.current.querySelectorAll(selector);
        if (!els.length) return;
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              const targets = ref.current.querySelectorAll(selector);
              targets.forEach((el, i) => {
                setTimeout(() => el.classList.add('is-visible'), i * staggerMs);
              });
              observer.disconnect();
            }
          });
        }, { threshold: 0.15 });
        observer.observe(ref.current);
        return () => observer.disconnect();
      }, []);
    }

            {/* Hero card USD 2.000 */}
            <div className="reveal flex justify-center mb-8">
              <div className="text-center p-8 md:p-10 rounded-[28px] bg-white border border-border card-hover shadow-sm w-full max-w-lg">
                <span className="text-4xl mb-3 block">💰</span>
                <p className="font-heading font-extrabold text-primary leading-none tracking-tight" style={{ fontSize: 'clamp(3rem, 8vw, 4.5rem)' }}>USD 2.000</p>
                <p className="text-ink-2 text-base font-sans mt-3">Pack completo de punta a punta</p>
              </div>
            </div>

            {/* 4 cards horizontales */}
            <div className="reveal grid grid-cols-2 md:grid-cols-4 gap-4 mb-0">
              {infoCards.map((card, i) => (
                <div key={i} className="p-5 rounded-2xl bg-white border border-border card-hover text-center">
                  <span className="text-2xl mb-2 block">{card.emoji}</span>
                  <p className="font-mono text-primary/60 text-[10px] tracking-wider uppercase mb-1">{card.label}</p>
                  <p className="font-heading font-bold text-ink text-sm mb-1">{card.value}</p>
                  <p className="text-ink-3 text-xs font-sans leading-relaxed">{card.sub}</p>
                </div>
              ))}
            </div>

            {/* 120px spacing + divider + Cómo funciona */}
            <div className="reveal" style={{ marginTop: '120px' }}>
              <div className="flex items-center gap-4 mb-8">
                <div className="flex-1 h-px bg-primary/15"></div>
                <p className="font-mono text-primary/60 text-xs tracking-wider uppercase whitespace-nowrap">Cómo funciona</p>
                <div className="flex-1 h-px bg-primary/15"></div>
              </div>

              <div className="text-center mb-8">
                <h3 className="font-heading font-extrabold text-ink leading-[1.1] tracking-[-0.02em]" style={{ fontSize: 'clamp(1.3rem, 2.5vw, 1.8rem)' }}>
                  Un camino claro de{' '}
                  <span className="italic font-medium text-primary">obra a equipo</span>
                </h3>
              </div>

              <div className="space-y-4 max-w-4xl mx-auto">
                {[
                  { step: '01', title: 'Definimos el pack juntos', desc: 'Leandro (CTO) te presenta los 3 verticales (POS, delivery, pagos), discutimos el approach técnico y cerramos entregables y timeline. USD 2.000 por el pack completo.' },
                  { step: '02', title: 'Construís el pack con soporte directo del CTO', desc: 'Trabajás 100% remoto. Backend de integraciones + capa frontend. Acceso directo a Leandro y al equipo de desarrollo. Tráfico real desde día 1.' },
                  { step: '03', title: 'Si hay fit mutuo, la relación escala', desc: 'La obra es la mejor forma de conocernos. Si funciona, pasamos a full-time o híbrido CABA, con compensación senior LATAM en USD.' },
                ].map((s, i) => (
                  <div key={i} className="reveal p-5 md:p-6 rounded-2xl bg-white border border-border card-hover">
                    <div className="flex items-start gap-4">
                      <div className="w-8 h-8 rounded-lg bg-primary/8 flex items-center justify-center flex-shrink-0 mt-0.5">
                        <span className="text-xs font-heading font-bold text-primary">{s.step}</span>
                      </div>
                      <div className="flex-1">
                        <p className="font-heading font-bold text-ink text-sm mb-1">{s.title}</p>
                        <p className="text-ink-2 text-xs font-sans leading-relaxed">{s.desc}</p>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </section>
      );
    }

    /* ============================================================
       COMO APLICAR
    ============================================================ */
    const FORM_ENDPOINT = "https://script.google.com/macros/s/AKfycbyyzsnjrL7Thiou73B3U3gnEN2jTKDubs-85SV12TO3bUAGUbl-y50W3YaNgegLygpA/exec";

    function ApplicationModal({ isOpen, onClose }) {
      const [formData, setFormData] = useState({
        nombre: '', email: '', whatsapp: '', ubicacion: '', startup: '', startupDetalle: '',
        experiencia: '', stack: [], claudeCode: '', claudeCodeDetalle: '', repo: '', extra: ''
      });
      const [submitting, setSubmitting] = useState(false);
      const [success, setSuccess] = useState(false);
      const [error, setError] = useState('');

      const stackOptions = ['React', 'TypeScript', 'Node.js', 'Express', 'NestJS', 'MongoDB', 'PostgreSQL', 'Redis', 'BullMQ', 'Tailwind', 'Other'];

      const toggleStack = (tech) => {
        setFormData(prev => ({
          ...prev,
          stack: prev.stack.includes(tech) ? prev.stack.filter(t => t !== tech) : [...prev.stack, tech]
        }));
      };

      const validate = () => {
        if (!formData.nombre.trim()) return 'Nombre completo es obligatorio';
        if (!formData.email.trim() || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(formData.email)) return 'Email válido es obligatorio';
        if (!formData.whatsapp.trim() || formData.whatsapp.replace(/\D/g, '').length < 10) return 'WhatsApp con código de país (mínimo 10 dígitos)';
        if (!formData.ubicacion) return 'Seleccioná tu ubicación';
        if (!formData.startup) return 'Indicá si trabajaste en startup';
        if (!formData.experiencia) return 'Seleccioná años de experiencia';
        if (formData.stack.length === 0) return 'Seleccioná al menos una tecnología';
        if (!formData.claudeCode) return 'Indicá tu uso de Claude Code';
        if (!formData.repo.trim()) return 'Repo o portfolio es obligatorio';
        try { new URL(formData.repo); } catch { return 'URL de repo/portfolio no válida'; }
        return null;
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        const err = validate();
        if (err) { setError(err); return; }
        setError('');
        setSubmitting(true);
        try {
          await fetch(FORM_ENDPOINT, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ...formData, stack: formData.stack.join(', '), timestamp: new Date().toISOString() })
          });
          setSuccess(true);
        } catch (e) {
          setError('No pudimos enviar el formulario. Intentá de nuevo en unos minutos o escribinos a rebequileandro@gmail.com');
        } finally {
          setSubmitting(false);
        }
      };

      if (!isOpen) return null;

      const inputClass = "w-full px-4 py-3 rounded-xl border border-border bg-white text-ink text-sm font-sans focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-colors";
      const labelClass = "block font-heading font-semibold text-ink text-sm mb-1.5";
      const radioGroupClass = "flex flex-wrap gap-3";
      const radioClass = (selected) => `px-4 py-2.5 rounded-xl border text-sm font-sans cursor-pointer transition-all ${selected ? 'bg-primary text-white border-primary' : 'bg-white text-ink-2 border-border hover:border-primary/30'}`;

      return (
        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4" style={{ background: 'rgba(0,0,0,0.6)', backdropFilter: 'blur(4px)' }} onClick={onClose}>
          <div className="bg-white rounded-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto shadow-2xl" onClick={e => e.stopPropagation()}>
            <div className="sticky top-0 bg-white z-10 flex items-center justify-between px-6 py-4 border-b border-border rounded-t-2xl">
              <h3 className="font-heading font-bold text-ink text-lg">{success ? '¡Aplicación recibida!' : 'Aplicar como Full-Stack Engineer'}</h3>
              <button onClick={onClose} className="w-8 h-8 rounded-lg flex items-center justify-center hover:bg-primary/5 transition-colors">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
              </button>
            </div>

            <div className="p-6">
              {success ? (
                <div className="text-center py-8">
                  <span className="text-6xl block mb-4">✅</span>
                  <h4 className="font-heading font-extrabold text-ink text-xl mb-3">¡Aplicación recibida!</h4>
                  <p className="text-ink-2 text-base font-sans leading-relaxed max-w-md mx-auto mb-6">
                    Recibimos tu aplicación, gracias por tomarte el tiempo. <strong className="text-ink font-heading">Te vamos a contactar en las próximas 24-48 hs hábiles</strong> para coordinar una reunión con Leandro Rebequi (CTO Deenex).
                  </p>
                  <button onClick={onClose} className="btn-primary px-8 py-3 bg-primary text-white font-heading font-bold text-sm rounded-xl">Cerrar</button>
                </div>
              ) : (
                <form onSubmit={handleSubmit} className="space-y-5">
                  {error && <div className="p-3 rounded-xl bg-red-50 border border-red-200 text-red-700 text-sm font-sans">{error}</div>}

                  <div>
                    <label className={labelClass}>Nombre completo *</label>
                    <input type="text" className={inputClass} placeholder="Tu nombre completo" value={formData.nombre} onChange={e => setFormData(p => ({...p, nombre: e.target.value}))} />
                  </div>

                  <div>
                    <label className={labelClass}>Email *</label>
                    <input type="email" className={inputClass} placeholder="tu@email.com" value={formData.email} onChange={e => setFormData(p => ({...p, email: e.target.value}))} />
                  </div>

                  <div>
                    <label className={labelClass}>WhatsApp (con código país) *</label>
                    <input type="tel" className={inputClass} placeholder="+54 9 11 1234-5678" value={formData.whatsapp} onChange={e => setFormData(p => ({...p, whatsapp: e.target.value}))} />
                  </div>

                  <div>
                    <label className={labelClass}>¿Vivís en CABA o GBA? *</label>
                    <div className={radioGroupClass}>
                      {['Sí, CABA', 'Sí, GBA', 'No, otra'].map(opt => (
                        <button type="button" key={opt} className={radioClass(formData.ubicacion === opt)} onClick={() => setFormData(p => ({...p, ubicacion: opt}))}>{opt}</button>
                      ))}
                    </div>
                  </div>

                  <div>
                    <label className={labelClass}>¿Trabajaste en startup antes? *</label>
                    <div className={radioGroupClass}>
                      {['Sí', 'No'].map(opt => (
                        <button type="button" key={opt} className={radioClass(formData.startup === opt)} onClick={() => setFormData(p => ({...p, startup: opt}))}>{opt}</button>
                      ))}
                    </div>
                    {formData.startup === 'Sí' && (
                      <textarea className={`${inputClass} mt-3`} rows="2" placeholder="Contanos brevemente cuál y qué hacías" value={formData.startupDetalle} onChange={e => setFormData(p => ({...p, startupDetalle: e.target.value}))} />
                    )}
                  </div>

                  <div>
                    <label className={labelClass}>Años de experiencia full-stack *</label>
                    <select className={inputClass} value={formData.experiencia} onChange={e => setFormData(p => ({...p, experiencia: e.target.value}))}>
                      <option value="">Seleccionar...</option>
                      <option value="<3">Menos de 3</option>
                      <option value="3-5">3 a 5</option>
                      <option value="5-8">5 a 8</option>
                      <option value="8+">8+</option>
                    </select>
                  </div>

                  <div>
                    <label className={labelClass}>Stack principal que usaste *</label>
                    <div className="flex flex-wrap gap-2">
                      {stackOptions.map(tech => (
                        <button type="button" key={tech} className={radioClass(formData.stack.includes(tech))} onClick={() => toggleStack(tech)}>{tech}</button>
                      ))}
                    </div>
                  </div>

                  <div>
                    <label className={labelClass}>¿Usás Claude Code DIARIO? *</label>
                    <div className={radioGroupClass}>
                      {['Sí, todos los días', 'Lo uso pero no diario', 'No'].map(opt => (
                        <button type="button" key={opt} className={radioClass(formData.claudeCode === opt)} onClick={() => setFormData(p => ({...p, claudeCode: opt}))}>{opt}</button>
                      ))}
                    </div>
                    {formData.claudeCode === 'Sí, todos los días' && (
                      <textarea className={`${inputClass} mt-3`} rows="2" placeholder="Contanos cómo lo integrás (CLAUDE.md, hooks, MCPs, comandos slash)" value={formData.claudeCodeDetalle} onChange={e => setFormData(p => ({...p, claudeCodeDetalle: e.target.value}))} />
                    )}
                  </div>

                  <div>
                    <label className={labelClass}>Repo público o portfolio *</label>
                    <input type="url" className={inputClass} placeholder="https://github.com/tu-usuario o https://tudominio.com" value={formData.repo} onChange={e => setFormData(p => ({...p, repo: e.target.value}))} />
                  </div>

                  <div>
                    <label className={labelClass}>¿Algo más que quieras contar?</label>
                    <textarea className={inputClass} rows="3" placeholder="Opcional" value={formData.extra} onChange={e => setFormData(p => ({...p, extra: e.target.value}))} />
                  </div>

                  <button type="submit" disabled={submitting}
                    className="btn-primary w-full py-4 bg-primary text-white font-heading font-bold text-base rounded-xl shadow-lg shadow-primary/20 disabled:opacity-60 disabled:cursor-not-allowed">
                    {submitting ? 'Enviando...' : '⚡ ENVIAR APLICACIÓN'}
                  </button>
                </form>
              )}
            </div>
          </div>
        </div>
      );
    }

    function ComoAplicar() {
      const ref = useRef(null);
      useRevealOnScroll(ref, '.reveal', 100);
      const [modalOpen, setModalOpen] = useState(false);

      return (
        <>
        <section ref={ref} id="aplicar" className="py-20 md:py-28 px-5 md:px-10">
          <div className="max-w-3xl mx-auto text-center">
            <div className="reveal inline-flex items-center gap-2.5 px-4 py-2 rounded-full bg-primary/8 border border-primary/15 mb-8">
              <span className="w-2 h-2 rounded-full bg-green-500" style={{ animation: 'pulse-dot 2s infinite' }}></span>
              <span className="text-primary text-xs font-mono font-medium tracking-wider uppercase">Aplicar</span>
            </div>

            <h2 className="reveal font-heading font-extrabold text-ink leading-[1.05] tracking-[-0.03em] mb-5"
                style={{ fontSize: 'clamp(1.8rem, 4vw, 3rem)' }}>
              Es tu turno.
            </h2>

            <p className="reveal text-ink-2 text-base leading-relaxed max-w-xl mx-auto mb-8 font-sans">
              Si tildaste los checkboxes y todo te cierra, completá el formulario. Te respondemos en 24-48 hs hábiles para coordinar la entrevista con Leandro Rebequi (CTO).
            </p>

            <div className="reveal flex justify-center mb-6">
              <button onClick={() => setModalOpen(true)}
                className="btn-primary inline-flex items-center justify-center gap-2.5 w-full max-w-md px-8 py-5 bg-primary text-white font-heading font-bold text-lg rounded-xl shadow-xl shadow-primary/20">
                ⚡ APLICAR AHORA
              </button>
            </div>

            <div className="reveal">
              <p className="text-ink-3 text-sm font-sans">
                Entrevistas: Lun 4 a Jue 7 de mayo · 15 a 19 hs ARG · 30 min con Leandro · Google Meet
              </p>
            </div>
          </div>
        </section>
        <ApplicationModal isOpen={modalOpen} onClose={() => setModalOpen(false)} />
        </>
      );
    }

    /* ============================================================
       FOOTER
    ============================================================ */
    function Footer() {
      return (
        <footer className="mx-4 md:mx-8 rounded-t-[32px] bg-primary px-6 md:px-12 pt-12 pb-7">
          <div className="max-w-6xl mx-auto">
            <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-8">
              <DeenexLogoWhite className="h-5 w-auto" />
              <div className="flex flex-wrap gap-6">
                <a href="https://deenex.com" className="text-white/50 text-sm font-sans hover:text-white/80 transition-colors">deenex.com</a>
                <a href="https://linkedin.com/company/deenex" className="text-white/50 text-sm font-sans hover:text-white/80 transition-colors">LinkedIn</a>
              </div>
            </div>
            <div className="border-t border-white/[0.1] pt-5 flex flex-col md:flex-row justify-between items-center gap-3">
              <p className="text-white/30 text-xs font-sans">© 2026 Deenex. Todos los derechos reservados.</p>
              <div className="flex items-center gap-2">
                <span className="w-1.5 h-1.5 rounded-full bg-green-400/80" style={{ animation: 'pulse-dot 3s infinite' }}></span>
                <span className="text-white/30 text-xs font-mono">Sistema operativo</span>
              </div>
            </div>
          </div>
        </footer>
      );
    }

    /* ============================================================
       APP
    ============================================================ */
    function App() {
      return (
        <>
          <Navbar />
          <Hero />
          <QuienesSomos />
          <LaOportunidad />
          <ElRol />
          <Mentalidad />
          <Requisitos />
          <Compensacion />
          <ComoAplicar />
          <Footer />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
