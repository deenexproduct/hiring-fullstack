    function useRevealOnScroll(ref, selector, staggerMs = 80) {
      useEffect(() => {
        if (!ref.current) return;
        const els = ref.current.querySelectorAll(selector);
        if (!els.length) return;
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              const targets = ref.current.querySelectorAll(selector);
              targets.forEach((el, i) => {
                setTimeout(() => el.classList.add('is-visible'), i * staggerMs);
              });
              observer.disconnect();
            }
          });
        }, { threshold: 0.15 });
        observer.observe(ref.current);
        return () => observer.disconnect();
      }, []);
    }

    /* ============================================================
       COMO APLICAR
    ============================================================ */
    const FORM_ENDPOINT = "https://script.google.com/macros/s/AKfycbyyzsnjrL7Thiou73B3U3gnEN2jTKDubs-85SV12TO3bUAGUbl-y50W3YaNgegLygpA/exec";

    const Field = ({ label, hint, children }) => (
      <div>
        <label className="block font-heading font-semibold text-ink text-sm mb-1.5">{label}</label>
        {hint && <p className="text-ink-3 text-xs font-sans -mt-1 mb-2">{hint}</p>}
        {children}
      </div>
    );
    const RadioGroup = ({ value, onChange, options }) => (
      <div className="flex flex-wrap gap-2.5">
        {options.map(opt => (
          <button type="button" key={opt}
            className={`px-4 py-2.5 rounded-xl border text-sm font-sans cursor-pointer transition-all ${value === opt ? 'bg-primary text-white border-primary shadow-md shadow-primary/20' : 'bg-white text-ink-2 border-border hover:border-primary/40 hover:bg-primary/5'}`}
            onClick={() => onChange(opt)}>{opt}</button>
        ))}
      </div>
    );
    const SelectField = ({ value, onChange, options }) => (
      <select className="w-full px-4 py-3 rounded-xl border border-border bg-white text-ink text-sm font-sans focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-colors"
        value={value} onChange={e => onChange(e.target.value)}>
        <option value="">Seleccionar...</option>
        {options.map(o => <option key={o} value={o}>{o}</option>)}
      </select>
    );
    const StepHeader = ({ num, total, title, subtitle }) => (
      <div className="mb-6">
        <p className="text-primary text-xs font-mono uppercase tracking-widest mb-1.5">Paso {num} de {total}</p>
        <h4 className="font-heading font-extrabold text-ink text-2xl tracking-tight mb-1">{title}</h4>
        {subtitle && <p className="text-ink-2 text-sm font-sans">{subtitle}</p>}
      </div>
    );

    const WIZARD_STORAGE_KEY = 'deenex-hiring-wizard-v1';
    const EMPTY_FORM = {
      nombre: '', email: '', whatsapp: '', linkedin: '', ubicacion: '',
      trabajando_actualmente: '', startup_previa: '', startup_detalle: '',
      anios_exp_total: '',
      anios_react_ts: '', anios_node: '', anios_mongodb: '', anios_redis_queues: '',
      exp_microservicios: '', caso_microservicios: '',
      exp_async: '', caso_async: '',
      exp_integraciones: '', caso_integraciones: '',
      claude_code_diario: '', claude_code_como: '',
      repo: '', cuando_arranca: '', horas_semana: '', pretension_fulltime: '',
      como_te_enteraste: '', notas_extra: ''
    };

    function loadWizardDraft() {
      try {
        const raw = localStorage.getItem(WIZARD_STORAGE_KEY);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        if (!parsed || typeof parsed !== 'object') return null;
        if (Date.now() - (parsed.savedAt || 0) > 1000 * 60 * 60 * 24 * 14) return null;
        return parsed;
      } catch { return null; }
    }

    function ApplicationModal({ isOpen, onClose }) {
      const [step, setStep] = useState(0);
      const [direction, setDirection] = useState('forward');
      const [formData, setFormData] = useState({ ...EMPTY_FORM });
      const [submitting, setSubmitting] = useState(false);
      const [success, setSuccess] = useState(false);
      const [error, setError] = useState('');
      const [draftRestored, setDraftRestored] = useState(false);
      const [draftLoaded, setDraftLoaded] = useState(false);

      const update = (k, v) => setFormData(p => ({ ...p, [k]: v }));

      // Cargar borrador cuando el modal se abre por primera vez
      useEffect(() => {
        if (!isOpen || draftLoaded) return;
        const draft = loadWizardDraft();
        if (draft && draft.formData) {
          setFormData({ ...EMPTY_FORM, ...draft.formData });
          if (Number.isInteger(draft.step)) setStep(draft.step);
          setDraftRestored(true);
        }
        setDraftLoaded(true);
      }, [isOpen, draftLoaded]);

      // Persistir borrador en cada cambio
      useEffect(() => {
        if (success || !draftLoaded) return;
        const hasContent = Object.values(formData).some(v => typeof v === 'string' && v.trim().length > 0);
        if (!hasContent && step === 0) return;
        try {
          localStorage.setItem(WIZARD_STORAGE_KEY, JSON.stringify({ formData, step, savedAt: Date.now() }));
        } catch {}
      }, [formData, step, success, draftLoaded]);

      // Limpiar al enviar con éxito
      useEffect(() => {
        if (success) {
          try { localStorage.removeItem(WIZARD_STORAGE_KEY); } catch {}
        }
      }, [success]);

      const discardDraft = () => {
        try { localStorage.removeItem(WIZARD_STORAGE_KEY); } catch {}
        setFormData({ ...EMPTY_FORM });
        setStep(0);
        setError('');
        setDraftRestored(false);
      };

      // Reset al cerrar (para que la próxima apertura sea fresh tras éxito)
      useEffect(() => {
        if (!isOpen) {
          setTimeout(() => {
            if (success) {
              setSuccess(false);
              setStep(0);
              setError('');
              setFormData({ ...EMPTY_FORM });
            }
          }, 300);
        }
      }, [isOpen, success]);

      const stepsMeta = [
        { num: 1, key: 'datos', label: 'Datos básicos', icon: '👤' },
        { num: 2, key: 'experiencia', label: 'Experiencia', icon: '💼' },
        { num: 3, key: 'stack', label: 'Stack técnico', icon: '🛠️' },
        { num: 4, key: 'claude', label: 'Claude Code', icon: '🔒' },
        { num: 5, key: 'disponibilidad', label: 'Disponibilidad', icon: '⏱️' },
        { num: 6, key: 'origen', label: 'Origen', icon: '📨' },
      ];

      const validateStep = (s) => {
        if (s === 0) {
          if (!formData.nombre.trim()) return 'Nombre completo es obligatorio';
          if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(formData.email)) return 'Email válido es obligatorio';
          if (formData.whatsapp.replace(/\D/g, '').length < 10) return 'WhatsApp con código de país (mínimo 10 dígitos)';
          if (!formData.ubicacion) return 'Indicá tu ubicación';
        }
        if (s === 1) {
          if (!formData.trabajando_actualmente) return 'Indicá tu situación laboral actual';
          if (!formData.startup_previa) return 'Indicá si trabajaste en startup';
          if (!formData.anios_exp_total) return 'Indicá tus años de experiencia full-stack';
        }
        if (s === 2) {
          if (!formData.anios_react_ts) return 'Indicá años con React+TS';
          if (!formData.anios_node) return 'Indicá años con Node.js';
          if (!formData.anios_mongodb) return 'Indicá años con MongoDB';
          if (!formData.exp_microservicios) return 'Indicá experiencia con microservicios';
          if (!formData.exp_async) return 'Indicá experiencia con sistemas async';
          if (!formData.exp_integraciones) return 'Indicá experiencia con integraciones';
        }
        if (s === 3) {
          if (!formData.claude_code_diario) return 'Indicá tu uso de Claude Code';
        }
        if (s === 4) {
          if (!formData.cuando_arranca) return 'Indicá cuándo podés arrancar';
          if (!formData.horas_semana) return 'Indicá horas semanales disponibles';
        }
        if (s === 5) {
          if (!formData.repo.trim()) return 'Repo o portfolio es obligatorio';
          try { new URL(formData.repo); } catch { return 'URL de repo/portfolio no válida'; }
        }
        return null;
      };

      const next = () => {
        const err = validateStep(step);
        if (err) { setError(err); return; }
        setError('');
        setDirection('forward');
        setStep(s => Math.min(s + 1, stepsMeta.length - 1));
      };
      const prev = () => {
        setError('');
        setDirection('back');
        setStep(s => Math.max(s - 1, 0));
      };

      const handleSubmit = async () => {
        const err = validateStep(stepsMeta.length - 1);
        if (err) { setError(err); return; }
        setError('');
        setSubmitting(true);
        try {
          const utm = new URLSearchParams(window.location.search).get('utm_source') || 'direct';
          await fetch(FORM_ENDPOINT, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'text/plain;charset=UTF-8' },
            body: JSON.stringify({ ...formData, utm, user_agent: navigator.userAgent.slice(0, 200), timestamp: new Date().toISOString() })
          });
          setSuccess(true);
        } catch (e) {
          setError('No pudimos enviar el formulario. Probá de nuevo o escribinos a rebequileandro@gmail.com');
        } finally {
          setSubmitting(false);
        }
      };

      if (!isOpen) return null;

      const inputClass = "w-full px-4 py-3 rounded-xl border border-border bg-white text-ink text-sm font-sans focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-colors";
      const labelClass = "block font-heading font-semibold text-ink text-sm mb-1.5";
      const radioGroupClass = "flex flex-wrap gap-2.5";
      const radioClass = (selected) => `px-4 py-2.5 rounded-xl border text-sm font-sans cursor-pointer transition-all ${selected ? 'bg-primary text-white border-primary shadow-md shadow-primary/20' : 'bg-white text-ink-2 border-border hover:border-primary/40 hover:bg-primary/5'}`;



      const stepKeys = stepsMeta.map(s => s.key);
      const currentStepKey = stepKeys[step];

      return (
        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4" style={{ background: 'rgba(0,0,0,0.6)', backdropFilter: 'blur(4px)' }} onClick={onClose}>
          <div className="bg-white rounded-2xl w-full max-w-2xl max-h-[92vh] overflow-y-auto shadow-2xl" onClick={e => e.stopPropagation()}>
            {/* Header sticky con título + close */}
            <div className="sticky top-0 bg-white z-10 px-4 md:px-6 pt-5 pb-4 border-b border-border rounded-t-2xl">
              <div className="flex items-center justify-between mb-4">
                <h3 className="font-heading font-bold text-ink text-lg">{success ? '¡Aplicación recibida!' : 'Aplicar como Full-Stack Engineer'}</h3>
                <button onClick={onClose} className="w-8 h-8 rounded-lg flex items-center justify-center hover:bg-primary/5 transition-colors">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                </button>
              </div>

              {/* Progress bar visual con steps */}
              {!success && (
                <div className="flex items-center gap-1.5">
                  {stepsMeta.map((s, idx) => (
                    <button
                      key={s.key}
                      type="button"
                      onClick={() => { if (idx <= step) { setStep(idx); setError(''); } }}
                      className={`flex-1 h-1.5 rounded-full transition-all ${idx < step ? 'bg-primary' : idx === step ? 'bg-primary' : 'bg-border'}`}
                      title={`${s.icon} ${s.label}`}
                    />
                  ))}
                </div>
              )}
            </div>

            <div className="p-4 md:p-6">
              {success ? (
                <div className="text-center py-10">
                  <span className="text-5xl md:text-7xl block mb-5">✅</span>
                  <h4 className="font-heading font-extrabold text-ink text-2xl mb-3">¡Aplicación recibida!</h4>
                  <p className="text-ink-2 text-base font-sans leading-relaxed max-w-md mx-auto mb-6">
                    Recibimos tu aplicación, gracias por tomarte el tiempo. <strong className="text-ink font-heading">Te vamos a contactar en las próximas 24-48 hs hábiles</strong> para coordinar una reunión con Leandro Rebequi (CTO Deenex).
                  </p>
                  <button onClick={onClose} className="btn-primary px-8 py-3 bg-primary text-white font-heading font-bold text-sm rounded-xl">Cerrar</button>
                </div>
              ) : (
                <div className="space-y-5" key={`step-${step}`} style={{ animation: `${direction === 'forward' ? 'slideInRight' : 'slideInLeft'} 0.3s ease-out` }}>
                  {draftRestored && (
                    <div className="p-3 rounded-xl bg-primary/5 border border-primary/20">
                      <div className="flex items-start gap-3">
                        <span className="text-base mt-0.5">💾</span>
                        <div className="flex-1 min-w-0">
                          <p className="text-ink text-sm font-heading font-semibold mb-0.5">Recuperamos tu borrador</p>
                          <p className="text-ink-2 text-xs font-sans leading-relaxed">Continuá donde lo dejaste. Si preferís empezar de cero, descartalo.</p>
                        </div>
                      </div>
                      <div className="flex gap-2 justify-end mt-2">
                        <button type="button" onClick={() => setDraftRestored(false)} className="text-xs font-sans text-ink-3 hover:text-ink px-3 py-1.5 rounded-lg hover:bg-primary/5">Continuar</button>
                        <button type="button" onClick={discardDraft} className="text-xs font-sans text-primary hover:underline font-semibold px-3 py-1.5 rounded-lg hover:bg-primary/10">Empezar de cero</button>
                      </div>
                    </div>
                  )}
                  {error && <div className="p-3 rounded-xl bg-red-50 border border-red-200 text-red-700 text-sm font-sans">{error}</div>}

                  {currentStepKey === 'datos' && (
                    <>
                      <StepHeader num="1" total="6" title="Datos básicos" subtitle="Para poder contactarte si calificás" />
                      <Field label="Nombre completo *">
                        <input type="text" className={inputClass} placeholder="Tu nombre completo" value={formData.nombre} onChange={e => update('nombre', e.target.value)} />
                      </Field>
                      <Field label="Email *">
                        <input type="email" className={inputClass} placeholder="tu@email.com" value={formData.email} onChange={e => update('email', e.target.value)} />
                      </Field>
                      <Field label="WhatsApp (con código país) *">
                        <input type="tel" className={inputClass} placeholder="+54 9 11 1234-5678" value={formData.whatsapp} onChange={e => update('whatsapp', e.target.value)} />
                      </Field>
                      <Field label="LinkedIn URL" hint="Tu perfil de LinkedIn (opcional pero suma)">
                        <input type="url" className={inputClass} placeholder="https://linkedin.com/in/tu-usuario" value={formData.linkedin} onChange={e => update('linkedin', e.target.value)} />
                      </Field>
                      <Field label="¿Vivís en CABA o GBA? *">
                        <RadioGroup value={formData.ubicacion} onChange={v => update("ubicacion", v)} options={['Sí, CABA', 'Sí, GBA', 'No, vivo en otra ciudad']} />
                      </Field>
                    </>
                  )}

                  {currentStepKey === 'experiencia' && (
                    <>
                      <StepHeader num="2" total="6" title="Experiencia general" subtitle="Para entender de dónde venís" />
                      <Field label="¿Estás trabajando actualmente? *">
                        <RadioGroup value={formData.trabajando_actualmente} onChange={v => update("trabajando_actualmente", v)} options={['Sí, full-time', 'Sí, freelance / por proyecto', 'No, estoy buscando']} />
                      </Field>
                      <Field label="¿Trabajaste en startup antes? *">
                        <RadioGroup value={formData.startup_previa} onChange={v => update("startup_previa", v)} options={['Sí', 'No']} />
                        {formData.startup_previa === 'Sí' && (
                          <textarea className={`${inputClass} mt-3`} rows="2" placeholder="Contanos cuál(es) y qué hacías ahí (1-2 líneas)" value={formData.startup_detalle} onChange={e => update('startup_detalle', e.target.value)} />
                        )}
                      </Field>
                      <Field label="Años de experiencia full-stack *">
                        <SelectField value={formData.anios_exp_total} onChange={v => update("anios_exp_total", v)} options={['Menos de 1', '1-2', '3-4', '5-7', '8+']} />
                      </Field>
                    </>
                  )}

                  {currentStepKey === 'stack' && (
                    <>
                      <StepHeader num="3" total="6" title="Stack técnico" subtitle="Lo más importante para nosotros" />
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <Field label="Años con React + TypeScript *">
                          <SelectField value={formData.anios_react_ts} onChange={v => update("anios_react_ts", v)} options={['0', 'Menos de 1', '1-2', '3-4', '5+']} />
                        </Field>
                        <Field label="Años con Node.js *">
                          <SelectField value={formData.anios_node} onChange={v => update("anios_node", v)} options={['0', 'Menos de 1', '1-2', '3-4', '5+']} />
                        </Field>
                        <Field label="Años con MongoDB *">
                          <SelectField value={formData.anios_mongodb} onChange={v => update("anios_mongodb", v)} options={['0', 'Menos de 1', '1-2', '3-4', '5+']} />
                        </Field>
                        <Field label="Años con Redis / queues">
                          <SelectField value={formData.anios_redis_queues} onChange={v => update("anios_redis_queues", v)} options={['0', 'Menos de 1', '1-2', '3-4', '5+']} />
                        </Field>
                      </div>
                      <Field label="¿Trabajaste con microservicios? *">
                        <RadioGroup value={formData.exp_microservicios} onChange={v => update("exp_microservicios", v)} options={['Sí, varios', 'Sí, uno', 'No']} />
                        {(formData.exp_microservicios === 'Sí, varios' || formData.exp_microservicios === 'Sí, uno') && (
                          <textarea className={`${inputClass} mt-3`} rows="2" placeholder="Contanos cómo estaban estructurados y qué resolvías" value={formData.caso_microservicios} onChange={e => update('caso_microservicios', e.target.value)} />
                        )}
                      </Field>
                      <Field label="¿Trabajaste con sistemas async / event-driven? *">
                        <RadioGroup value={formData.exp_async} onChange={v => update("exp_async", v)} options={['Sí, en producción', 'Sí, en proyectos personales', 'No']} />
                        {formData.exp_async.startsWith('Sí') && (
                          <textarea className={`${inputClass} mt-3`} rows="2" placeholder="Qué stack (BullMQ, RabbitMQ, Kafka, etc.) y qué problema resolvías" value={formData.caso_async} onChange={e => update('caso_async', e.target.value)} />
                        )}
                      </Field>
                      <Field label="¿Integraste un POS, gateway de pago o proveedor de delivery? *">
                        <RadioGroup value={formData.exp_integraciones} onChange={v => update("exp_integraciones", v)} options={['Sí, varios', 'Sí, uno', 'No nunca']} />
                        {formData.exp_integraciones.startsWith('Sí') && (
                          <textarea className={`${inputClass} mt-3`} rows="2" placeholder="Cuál (Mercado Pago / Fudo / PedidosYa / etc.) y qué fue lo más complicado" value={formData.caso_integraciones} onChange={e => update('caso_integraciones', e.target.value)} />
                        )}
                      </Field>
                    </>
                  )}

                  {currentStepKey === 'claude' && (
                    <>
                      <StepHeader num="4" total="6" title="Claude Code (excluyente)" subtitle="Si no usás Claude Code diariamente, no podemos avanzar" />
                      <div className="p-4 rounded-xl bg-primary/5 border border-primary/20">
                        <p className="text-ink text-sm font-sans leading-relaxed">
                          Buscamos a alguien que ya tenga <strong>Claude Code</strong> integrado en su workflow diario: <strong>CLAUDE.md</strong> en sus proyectos, <strong>hooks</strong>, <strong>MCPs</strong>, <strong>comandos slash</strong>, idealmente <strong>agents</strong>.
                        </p>
                      </div>
                      <Field label="¿Usás Claude Code (CLI / IDE de Anthropic) DIARIO? *">
                        <RadioGroup value={formData.claude_code_diario} onChange={v => update("claude_code_diario", v)} options={['Sí, todos los días', 'Lo uso pero no diario', 'No']} />
                        {formData.claude_code_diario === 'Sí, todos los días' && (
                          <textarea className={`${inputClass} mt-3`} rows="4" placeholder="Contanos cómo lo integrás (CLAUDE.md, hooks, MCPs custom, comandos slash habituales, agents armados)" value={formData.claude_code_como} onChange={e => update('claude_code_como', e.target.value)} />
                        )}
                      </Field>
                    </>
                  )}

                  {currentStepKey === 'disponibilidad' && (
                    <>
                      <StepHeader num="5" total="6" title="Disponibilidad y compensación" subtitle="Para cerrar números antes de la entrevista" />
                      <Field label="¿Cuándo podés arrancar? *">
                        <RadioGroup value={formData.cuando_arranca} onChange={v => update("cuando_arranca", v)} options={['Esta semana', 'Próxima semana', 'En 2 semanas', '1 mes o más']} />
                      </Field>
                      <Field label="Horas semanales que podés dedicar al pack *">
                        <SelectField value={formData.horas_semana} onChange={v => update("horas_semana", v)} options={['Menos de 15 hs/sem', '15-25 hs/sem', '25-40 hs/sem', 'Full-time (40+)']} />
                      </Field>
                      <Field label="Pretensión salarial mensual en USD si esto escala a full-time" hint="Opcional. Nos ayuda a alinear expectativas">
                        <input type="text" className={inputClass} placeholder="Ej: USD 3.500 / mes" value={formData.pretension_fulltime} onChange={e => update('pretension_fulltime', e.target.value)} />
                      </Field>
                    </>
                  )}

                  {currentStepKey === 'origen' && (
                    <>
                      <StepHeader num="6" total="6" title="Origen y notas" subtitle="Última pantalla. Después confirmás y enviás." />
                      <Field label="Repo público o portfolio *">
                        <input type="url" className={inputClass} placeholder="https://github.com/tu-usuario o https://tudominio.com" value={formData.repo} onChange={e => update('repo', e.target.value)} />
                      </Field>
                      <Field label="¿Cómo te enteraste de Deenex?">
                        <SelectField value={formData.como_te_enteraste} onChange={v => update("como_te_enteraste", v)} options={['Publicación de Alan en LinkedIn', 'Búsqueda en LinkedIn Jobs', 'Referido (decinos quién abajo)', 'Otra red social', 'Otra (decinos abajo)']} />
                      </Field>
                      <Field label="¿Algo más que quieras contar?" hint="Si te referenció alguien, decinos su nombre acá">
                        <textarea className={inputClass} rows="3" placeholder="Opcional" value={formData.notas_extra} onChange={e => update('notas_extra', e.target.value)} />
                      </Field>
                    </>
                  )}

                </div>
              )}

              {/* Botones de navegación */}
              {!success && (
                <div className="flex gap-3 mt-8 pt-5 border-t border-border">
                  {step > 0 && (
                    <button type="button" onClick={prev} disabled={submitting}
                      className="px-4 md:px-6 py-3 rounded-xl border border-border bg-white text-ink font-heading font-bold text-sm hover:bg-primary/5 transition-colors disabled:opacity-50">
                      ← Atrás
                    </button>
                  )}
                  <div className="flex-1" />
                  {step < stepsMeta.length - 1 ? (
                    <button type="button" onClick={next}
                      className="btn-primary px-8 py-3 bg-primary text-white font-heading font-bold text-sm rounded-xl shadow-lg shadow-primary/20 transition-transform hover:scale-[1.02]">
                      Siguiente →
                    </button>
                  ) : (
                    <button type="button" onClick={handleSubmit} disabled={submitting}
                      className="btn-primary px-8 py-3 bg-primary text-white font-heading font-bold text-sm rounded-xl shadow-lg shadow-primary/20 transition-transform hover:scale-[1.02] disabled:opacity-60 disabled:cursor-not-allowed">
                      {submitting ? 'Enviando...' : '⚡ Enviar aplicación'}
                    </button>
                  )}
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }


    function ComoAplicar({ onOpenModal }) {
      const ref = useRef(null);
      useRevealOnScroll(ref, '.reveal', 100);

      return (
        <section ref={ref} id="aplicar" className="py-20 md:py-28 px-5 md:px-10">
          <div className="max-w-3xl mx-auto text-center">
            <div className="reveal inline-flex items-center gap-2.5 px-4 py-2 rounded-full bg-primary/8 border border-primary/15 mb-8">
              <span className="w-2 h-2 rounded-full bg-green-500" style={{ animation: 'pulse-dot 2s infinite' }}></span>
              <span className="text-primary text-xs font-mono font-medium tracking-wider uppercase">Aplicar</span>
            </div>

            <h2 className="reveal font-heading font-extrabold text-ink leading-[1.05] tracking-[-0.03em] mb-5"
                style={{ fontSize: 'clamp(1.8rem, 4vw, 3rem)' }}>
              Es tu turno.
            </h2>

            <p className="reveal text-ink-2 text-base leading-relaxed max-w-xl mx-auto mb-8 font-sans">
              Si tildaste los checkboxes y todo te cierra, completá el formulario. Te respondemos en 24-48 hs hábiles para coordinar la entrevista con Leandro Rebequi (CTO).
            </p>

            <div className="reveal flex justify-center mb-6">
              <button onClick={onOpenModal}
                className="btn-primary inline-flex items-center justify-center gap-2.5 w-full max-w-md px-8 py-5 bg-primary text-white font-heading font-bold text-lg rounded-xl shadow-xl shadow-primary/20">
                APLICAR AHORA
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
              </button>
            </div>

            <div className="reveal">
              <p className="text-ink-3 text-sm font-sans">
                Entrevistas: Lun 4 a Jue 7 de mayo · 15 a 19 hs ARG · 30 min con Leandro · Google Meet
              </p>
            </div>
          </div>
        </section>
      );
    }

    /* ============================================================
       FOOTER
    ============================================================ */
    function Footer() {
      return (
        <footer className="mx-4 md:mx-8 rounded-t-[32px] bg-primary px-4 sm:px-6 md:px-12 pt-12 pb-7">
          <div className="max-w-6xl mx-auto">
            <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-8">
              <DeenexLogoWhite className="h-5 w-auto" />
              <div className="flex flex-wrap gap-6">
                <a href="https://deenex.com" className="text-white/50 text-sm font-sans hover:text-white/80 transition-colors">deenex.com</a>
                <a href="https://linkedin.com/company/deenex" className="text-white/50 text-sm font-sans hover:text-white/80 transition-colors">LinkedIn</a>
              </div>
            </div>
            <div className="border-t border-white/[0.1] pt-5 flex flex-col md:flex-row justify-between items-center gap-3">
              <p className="text-white/30 text-xs font-sans">© 2026 Deenex. Todos los derechos reservados.</p>
              <div className="flex items-center gap-2">
                <span className="w-1.5 h-1.5 rounded-full bg-green-400/80" style={{ animation: 'pulse-dot 3s infinite' }}></span>
                <span className="text-white/30 text-xs font-mono">Sistema operativo</span>
              </div>
            </div>
          </div>
        </footer>
      );
    }

    /* ============================================================
       APP
    ============================================================ */
    function App() {
      const [modalOpen, setModalOpen] = useState(false);
      const openModal = useCallback(() => setModalOpen(true), []);

      return (
        <>
          <Navbar onOpenModal={openModal} />
          <Hero onOpenModal={openModal} />
          <QuienesSomos />
          <LaOportunidad />
          <ElRol />
          <Mentalidad />
          <Requisitos />
          <Compensacion />
          <ComoAplicar onOpenModal={openModal} />
          <Footer />
          <ApplicationModal isOpen={modalOpen} onClose={() => setModalOpen(false)} />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
